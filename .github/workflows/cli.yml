name: CI Symfony

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  symfony-tests:
    runs-on: ubuntu-latest

    steps:
      # 1. Récupérer le code du dépôt
      - name: Cloner le dépôt
        uses: actions/checkout@v4

      # 2. Installer PHP et la Symfony CLI en une seule étape
      - name: Configurer PHP et Symfony CLI
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3' # Remplacez par votre version de PHP
          tools: symfony-cli # <--- C'est ici qu'on installe la Symfony CLI

      # 3. Vérifier que la CLI est bien installée
      - name: Vérifier la version de Symfony CLI
        run: symfony version

      # 4. Installer les dépendances du projet avec Composer
      - name: Installer les dépendances Composer
        run: composer install --no-progress --prefer-dist --optimize-autoloader

      # 5. Exemple d'utilisation de la Symfony CLI (ex: lancer le linter ou les tests)
      - name: Vérifier la configuration Symfony
        run: symfony check:requirements
